name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "VERSION"
      - "cmake/**"
      - "src/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CMakeLists.txt"
      - "VERSION"
      - "cmake/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtest-dev \
            zlib1g-dev \
            libbrotli-dev \
            libexpat1-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOPENMETA_BUILD_STATIC=ON
          -DOPENMETA_BUILD_SHARED=OFF
          -DOPENMETA_BUILD_TESTS=ON
          -DOPENMETA_BUILD_PYTHON=OFF
          -DOPENMETA_WITH_DNG_SDK_ADAPTER=OFF

      - name: Build public release gates
        run: >
          cmake --build build --parallel
          --target openmeta_gate_read_release openmeta_gate_cli_release openmeta_gate_transfer_release

      - name: Run public release gates
        run: >
          ctest --test-dir build
          -R 'openmeta_(read|cli|transfer)_release_gate'
          --output-on-failure

  linux-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ".github/workflows/ci.yml"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtest-dev \
            zlib1g-dev \
            libbrotli-dev \
            libexpat1-dev
          python -m pip install --upgrade pip
          python -m pip install nanobind

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DOPENMETA_BUILD_STATIC=ON
          -DOPENMETA_BUILD_SHARED=OFF
          -DOPENMETA_BUILD_TESTS=ON
          -DOPENMETA_BUILD_PYTHON=ON
          -DOPENMETA_WITH_DNG_SDK_ADAPTER=OFF
          -DOPENMETA_PYTHON_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')"

      - name: Build public release gates
        run: >
          cmake --build build --parallel
          --target openmeta_gate_read_release openmeta_gate_cli_release openmeta_gate_transfer_release

      - name: Run public release gates
        run: >
          ctest --test-dir build
          -R 'openmeta_(read|cli|transfer)_release_gate'
          --output-on-failure
